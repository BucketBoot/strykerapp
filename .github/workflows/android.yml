name: Build StrykerApp APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Кэширование зависимостей Gradle для ускорения сборки
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

#    - name: Build Debug APK
#      run: ./gradlew assembleDebug

    # (Опционально) Сборка Release APK (будет неподписанным)
    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease

    - name: Upload Debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: StrykerApp-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
